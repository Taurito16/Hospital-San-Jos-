<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Paciente - Hospital San José</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/registro-pacientes.css">
    <link rel="stylesheet" href="../../css/verificacion-paciente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .detail-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .detail-item label { display: block; font-size: 12px; color: #64748b; margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        .detail-item span { font-size: 16px; color: #1e293b; font-weight: 500; }
        .reingreso-info { background: #fff7ed; border: 1px solid #ffedd5; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .reingreso-title { color: #9a3412; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <main class="page-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-weight: 800; color: #0f172a;">Perfil Detallado del Paciente</h2>
                <button class="btn-module" onclick="window.history.back()" style="background: #f1f5f9; color: #64748b;"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            </div>

            <div class="detail-card">
                <div class="detail-grid" id="paciente-data">
                    <!-- Cargado por JS -->
                </div>
            </div>

            <div id="reingreso-container" style="display: none;">
                <div class="reingreso-info">
                    <div class="reingreso-title"><i class="fa-solid fa-clock-rotate-left"></i> INFORMACIÓN DE REINGRESOS</div>
                    <div class="detail-grid" id="reingreso-data">
                        <!-- Cargado por JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const client = typeof supabaseClient !== 'undefined' ? supabaseClient : supabase;
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) { window.location.href = 'seguimiento-pacientes.html'; return; }

            const { data: p, error } = await client.from('pacientes').select('*, perfiles(nombre_completo)').eq('id', id).single();
            if (error || !p) return;

            const container = document.getElementById('paciente-data');
            const fields = [
                { label: 'DNI', value: p.dni },
                { label: 'Apellidos', value: p.apellidos },
                { label: 'Nombres', value: p.nombres },
                { label: 'Historia Clínica', value: p.historia_clinica },
                { label: 'Fecha Nacimiento', value: p.fecha_nacimiento },
                { label: 'Seguro', value: p.tipo_seguro + (p.seguro_otros ? ' ('+p.seguro_otros+')' : '') },
                { label: 'Servicio Actual', value: p.servicio || 'N/A' },
                { label: 'Condición', value: p.condicion },
                { label: 'Registrado por', value: p.perfiles ? p.perfiles.nombre_completo : 'Sistema' }
            ];

            container.innerHTML = fields.map(f => `
                <div class="detail-item">
                    <label>${f.label}</label>
                    <span>${f.value}</span>
                </div>
            `).join('');

            // Lógica de Reingresos
            const { data: eventos } = await client.from('historial_eventos').select('*').eq('paciente_id', id).order('fecha_evento', {ascending: true});
            if (eventos) {
                const ingresos = eventos.filter(e => e.tipo_evento === 'Hospitalizado');
                if (ingresos.length > 1) {
                    document.getElementById('reingreso-container').style.display = 'block';
                    const numReingresos = ingresos.length - 1;
                    const serviciosPrevios = [...new Set(eventos.filter(e => e.tipo_evento === 'Cambio de Servicio').map(e => e.servicio_de))];
                    
                    document.getElementById('reingreso-data').innerHTML = `
                        <div class="detail-item"><label>Veces Reingresado</label><span>${numReingresos}</span></div>
                        <div class="detail-item"><label>Primer Ingreso</label><span>${new Date(ingresos[0].fecha_evento).toLocaleDateString()}</span></div>
                        <div class="detail-item"><label>Servicios Anteriores</label><span>${serviciosPrevios.join(', ') || 'Ninguno'}</span></div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
