<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital San José</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="login-page">
        <!-- Tarjeta Central con Glassmorphism -->
        <div class="login-card">

            <!-- Círculo del Logo Flotante -->
            <div class="logo-circle">
                <img src="img/logotipo_transparent.png" alt="Logo de la Empresa" class="company-logo">
            </div>

            <form id="login-form" class="login-form">
                <h2>Iniciar Sesión</h2>

                <div class="form-group">
                    <label for="email">Usuario (Email)</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="********">
                        <button type="button" id="toggle-password" class="toggle-btn" title="Mostrar/Ocultar">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="remember">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordar correo</label>
                </div>

                <button type="submit" id="login-btn" class="login-btn">
                    <span class="btn-text">Entrar</span>
                    <div class="spinner hidden"></div>
                </button>
                <p id="error-msg" class="error-msg"></p>
            </form>
        </div>
    </div>

    <!-- Scripts locales -->
    <script src="js/supabase-config.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
